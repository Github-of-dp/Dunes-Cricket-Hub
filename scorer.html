<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes FM - Full Control Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        command: {
                            bgCanvas: '#0A0A0A',     
                            card: '#16161A',         
                            border: '#24242B',       
                            accentYellow: '#FACC15', 
                            accentGreen: '#10B981',  
                            accentPurple: '#A855F7', 
                            accentBlue: '#0EA5E9',   
                            textMain: '#F3F4F6',     
                            textMuted: '#9CA3AF',    
                            inputBg: '#0F0F12',      
                            accentRed: '#EF4444'     
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-command-bgCanvas text-command-textMain font-sans min-h-screen antialiased p-4 pb-16">

    <header class="max-w-6xl mx-auto mb-8 border-b border-command-border/60 pb-5 mt-2">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-white/5 p-1.5 rounded-xl border border-command-border">
                    <div class="h-10 w-10 rounded-lg bg-command-accentYellow/10 border border-command-accentYellow/20 flex items-center justify-center font-black text-command-accentYellow text-sm">DFM</div>
                </div>
                <div class="text-center sm:text-left">
                    <h1 class="text-xl font-black tracking-wider text-command-accentYellow uppercase">Dunes FM Command Center</h1>
                    <p class="text-xs font-bold text-command-textMuted uppercase tracking-widest mt-0.5">Tournament Administration Console</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto space-y-6">
        
        <section class="bg-command-card border border-command-border rounded-2xl p-6 shadow-xl relative space-y-6">
            <div class="absolute top-0 right-0 bg-command-accentYellow text-black text-[9px] font-black px-2.5 py-0.5 rounded-bl-xl uppercase tracking-wider">
                Console 01
            </div>

            <h2 class="text-xs font-black tracking-wider text-command-accentYellow uppercase flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-command-accentYellow animate-pulse"></span>
                1. Live Score & Match Scorecard Engine
            </h2>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Batting House</label>
                    <input type="text" id="input-batting-team" placeholder="e.g., GREEN HOUSE" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2.5 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentYellow">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Bowling House</label>
                    <input type="text" id="input-bowling-team" placeholder="e.g., RED HOUSE" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2.5 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentYellow">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Total Runs</label>
                    <input type="number" id="input-runs" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-command-accentYellow">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Wickets Down</label>
                    <input type="number" id="input-wickets" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-command-accentYellow">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Overs Bowled</label>
                    <input type="text" id="input-overs" placeholder="0.0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-command-accentYellow">
                </div>
            </div>

            <div class="bg-black/40 border border-command-border/70 p-4 rounded-xl space-y-4">
                <div class="flex justify-between items-center border-b border-command-border/40 pb-2">
                    <h3 class="text-[10px] font-black tracking-wider text-command-accentYellow uppercase">⚡ Real-Time Ball Clicker Panel</h3>
                    <span class="text-[9px] font-mono text-command-textMuted">Updates overall counters automatically</span>
                </div>

                <div class="flex flex-wrap gap-2">
                    <button type="button" onclick="handleBallEvent(1, false)" class="bg-white/5 hover:bg-white/10 border border-command-border px-4 py-2 rounded-lg font-mono font-bold text-xs">+1 Run</button>
                    <button type="button" onclick="handleBallEvent(2, false)" class="bg-white/5 hover:bg-white/10 border border-command-border px-4 py-2 rounded-lg font-mono font-bold text-xs">+2 Runs</button>
                    <button type="button" onclick="handleBallEvent(3, false)" class="bg-white/5 hover:bg-white/10 border border-command-border px-4 py-2 rounded-lg font-mono font-bold text-xs">+3 Runs</button>
                    <button type="button" onclick="handleBallEvent(4, true, '4')" class="bg-command-accentBlue/20 hover:bg-command-accentBlue/30 border border-command-accentBlue/40 px-4 py-2 rounded-lg font-mono font-black text-xs text-command-accentBlue">+4 BOUNDARY</button>
                    <button type="button" onclick="handleBallEvent(6, true, '6')" class="bg-command-accentGreen/20 hover:bg-command-accentGreen/30 border border-command-accentGreen/40 px-4 py-2 rounded-lg font-mono font-black text-xs text-command-accentGreen">+6 MAXIMAL</button>
                    <button type="button" onclick="handleBallEvent(0, false)" class="bg-white/5 hover:bg-red-500/10 border border-command-border px-4 py-2 rounded-lg font-mono text-xs">Dot Ball</button>
                </div>

                <div class="flex flex-wrap gap-2 pt-1">
                    <button type="button" onclick="handleExtra('WD')" class="bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/30 px-3 py-2 rounded-lg font-bold text-[11px] text-purple-400">Wide Ball (+1 Run)</button>
                    <button type="button" onclick="handleExtra('NB')" class="bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/30 px-3 py-2 rounded-lg font-bold text-[11px] text-purple-400">No Ball (+1 Run)</button>
                    <button type="button" onclick="handleWicketEvent()" class="bg-command-accentRed/20 hover:bg-command-accentRed/30 border border-command-accentRed/40 px-4 py-2 rounded-lg font-black text-xs text-command-accentRed">🛑 WICKET FALLS</button>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 border-t border-command-border/40 pt-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Striker Status Line</label>
                    <input type="text" id="input-bat1" placeholder="Shajan 42(21)" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentYellow">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Non-Striker Status Line</label>
                    <input type="text" id="input-bat2" placeholder="Aksha 18(12)" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentYellow">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Active Bowler Status Line</label>
                    <input type="text" id="input-bowler" placeholder="Ishaan 3-0-24-1" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentYellow">
                </div>
            </div>

            <div class="border-t border-command-border/40 pt-4 space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-black tracking-wider text-command-accentYellow uppercase">🏏 Live Full Scorecard Layouts</h3>
                    <button type="button" onclick="clearScorecardBoxes()" class="text-[9px] font-bold text-command-accentRed uppercase tracking-wider hover:underline">Clear Entire Scorecard</button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Batting Scorecard Layout (Live Sync Window)</label>
                        <textarea id="input-scorecard-batting" rows="6" class="w-full bg-command-inputBg border border-command-border rounded-lg p-3 text-xs font-mono text-white focus:outline-none focus:border-command-accentYellow whitespace-pre"></textarea>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Bowling Scorecard Layout (Live Sync Window)</label>
                        <textarea id="input-scorecard-bowling" rows="6" class="w-full bg-command-inputBg border border-command-border rounded-lg p-3 text-xs font-mono text-white focus:outline-none focus:border-command-accentYellow whitespace-pre"></textarea>
                    </div>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Live Commentary Feed</label>
                <input type="text" id="input-commentary" placeholder="Updates dynamically..." class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2.5 text-xs text-white focus:outline-none focus:border-command-accentYellow">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 pt-2">
                <button onclick="broadcastData()" class="sm:col-span-2 bg-command-accentYellow text-black py-3.5 rounded-xl font-black text-xs uppercase tracking-widest hover:opacity-90 transition shadow-lg">
                    Broadcast Update State ⚡
                </button>
                <button onclick="resetLiveBroadcast()" class="bg-transparent hover:bg-red-600/10 border border-command-accentRed/40 text-command-accentRed py-3.5 rounded-xl font-black text-xs uppercase tracking-widest transition">
                    Reset Live Ticker 🛑
                </button>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <section class="bg-command-card border border-command-border rounded-2xl p-6 shadow-xl relative space-y-5">
                <h2 class="text-xs font-black tracking-wider text-command-accentGreen uppercase">2. Standings Matrix Modifier</h2>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Target House Row</label>
                    <select id="select-house" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2.5 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentGreen">
                        <option value="GREEN HOUSE">GREEN HOUSE</option>
                        <option value="RED HOUSE">RED HOUSE</option>
                        <option value="YELLOW HOUSE">YELLOW HOUSE</option>
                        <option value="BLUE HOUSE">BLUE HOUSE</option>
                    </select>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <input type="number" id="input-played" placeholder="P" class="bg-command-inputBg border border-command-border rounded-lg p-2 text-xs font-bold text-white text-center">
                    <input type="number" id="input-won" placeholder="W" class="bg-command-inputBg border border-command-border rounded-lg p-2 text-xs font-bold text-white text-center">
                    <input type="number" id="input-lost" placeholder="L" class="bg-command-inputBg border border-command-border rounded-lg p-2 text-xs font-bold text-white text-center">
                </div>
                <input type="number" id="input-pts" placeholder="Points" class="w-full bg-command-inputBg border border-command-border rounded-lg p-2 text-xs font-bold text-white">
                <button onclick="pushStandingsMatrix()" class="w-full bg-command-accentGreen text-black py-2.5 rounded-xl font-black text-xs uppercase tracking-widest hover:opacity-90 transition">Push Standing Update</button>
            </section>

            <section class="bg-command-card border border-command-border rounded-2xl p-6 shadow-xl relative space-y-5">
                <h2 class="text-xs font-black tracking-wider text-command-accentPurple uppercase">3. Tournament Leaderboard Allocator</h2>
                <input type="text" id="stat-player-name" placeholder="Player Name" class="w-full bg-command-inputBg border border-command-border rounded-lg p-2 text-xs font-bold text-white">
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="stat-total-runs" placeholder="Runs" class="bg-command-inputBg border border-command-border rounded-lg p-2 text-xs text-center text-white">
                    <input type="number" id="stat-total-wickets" placeholder="Wickets" class="bg-command-inputBg border border-command-border rounded-lg p-2 text-xs text-center text-white">
                    <input type="number" id="stat-highest-score" placeholder="Highest" class="bg-command-inputBg border border-command-border rounded-lg p-2 text-xs text-center text-white">
                </div>
                <button onclick="pushPlayerTally()" class="w-full bg-command-accentPurple text-white py-2.5 rounded-xl font-black text-xs uppercase tracking-widest hover:opacity-90 transition">Upsert Leaderboard</button>
            </section>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Clicker State Automations
        function handleBallEvent(runs, isBoundary, boundType = '') {
            // 1. Update master run count
            const runsField = document.getElementById('input-runs');
            runsField.value = (parseInt(runsField.value) || 0) + runs;

            // 2. Formulate quick commentary snapshot string
            let logText = `${runs} run${runs !== 1 ? 's' : ''} added to the board.`;
            if (isBoundary) logText = `🔥 MAGNIFICENT ${boundType}! Smashed away beautifully!`;
            if (runs === 0) logText = `Good delivery, fields completely locked for a dot ball.`;
            document.getElementById('input-commentary').value = logText;
        }

        function handleExtra(type) {
            const runsField = document.getElementById('input-runs');
            runsField.value = (parseInt(runsField.value) || 0) + 1;
            document.getElementById('input-commentary').value = `📢 Extra awarded: ${type === 'WD' ? 'WIDE BALL' : 'NO BALL'} (+1 Run)`;
        }

        function handleWicketEvent() {
            const wicketsField = document.getElementById('input-wickets');
            wicketsField.value = (parseInt(wicketsField.value) || 0) + 1;
            document.getElementById('input-commentary').value = `🛑 OUT! Big wicket falls! The fielding side celebrates!`;
        }

        function clearScorecardBoxes() {
            if (confirm("Reset current display scorecards?")) {
                document.getElementById('input-scorecard-batting').value = "";
                document.getElementById('input-scorecard-bowling').value = "";
            }
        }

        async function fetchCurrentData() {
            const { data: match } = await supabase.from('live_match').select('*').eq('id', 1).maybeSingle();
            if (match) {
                document.getElementById('input-runs').value = match.runs ?? 0;
                document.getElementById('input-wickets').value = match.wickets ?? 0;
                document.getElementById('input-overs').value = match.overs || "0.0";
                document.getElementById('input-commentary').value = match.commentary || "";
                document.getElementById('input-batting-team').value = match.batting_team || "";
                document.getElementById('input-bowling-team').value = match.bowling_team || "";
                
                document.getElementById('input-bat1').value = match.batsman_on_strike || "";
                document.getElementById('input-bat2').value = match.batsman_off_strike || "";
                document.getElementById('input-bowler').value = match.current_bowler || "";

                document.getElementById('input-scorecard-batting').value = match.scorecard_batting || "";
                document.getElementById('input-scorecard-bowling').value = match.scorecard_bowling || "";
            }
        }

        async function broadcastData() {
            const updatePayload = {
                runs: parseInt(document.getElementById('input-runs').value) || 0,
                wickets: parseInt(document.getElementById('input-wickets').value) || 0,
                overs: document.getElementById('input-overs').value,
                commentary: document.getElementById('input-commentary').value,
                batting_team: document.getElementById('input-batting-team').value,
                bowling_team: document.getElementById('input-bowling-team').value,
                batsman_on_strike: document.getElementById('input-bat1').value,
                batsman_off_strike: document.getElementById('input-bat2').value,
                current_bowler: document.getElementById('input-bowler').value,
                scorecard_batting: document.getElementById('input-scorecard-batting').value,
                scorecard_bowling: document.getElementById('input-scorecard-bowling').value
            };
            
            const { error } = await supabase.from('live_match').update(updatePayload).eq('id', 1);
            if (error) alert(error.message); else alert("Telemetry broadcasted completely!");
        }

        async function resetLiveBroadcast() {
            if(!confirm("Reset live match?")) return;
            const resetPayload = {
                runs: 0, wickets: 0, overs: "0.0",
                batting_team: "", bowling_team: "",
                batsman_on_strike: "", batsman_off_strike: "", current_bowler: "",
                scorecard_batting: "", scorecard_bowling: "",
                commentary: "Innings commencing shortly..."
            };
            await supabase.from('live_match').update(resetPayload).eq('id', 1);
            fetchCurrentData();
        }

        async function pushStandingsMatrix() {
            const house = document.getElementById('select-house').value;
            const payload = {
                played: parseInt(document.getElementById('input-played').value) || 0,
                won: parseInt(document.getElementById('input-won').value) || 0,
                lost: parseInt(document.getElementById('input-lost').value) || 0,
                points: parseInt(document.getElementById('input-pts').value) || 0
            };
            await supabase.from('points_table').update(payload).eq('house_name', house);
            alert("Standings locked.");
        }

        async function pushPlayerTally() {
            const name = document.getElementById('stat-player-name').value;
            if(!name) return alert("Enter player name");
            const payload = {
                player_name: name,
                total_runs: parseInt(document.getElementById('stat-total-runs').value) || 0,
                total_wickets: parseInt(document.getElementById('stat-total-wickets').value) || 0,
                highest_score: parseInt(document.getElementById('stat-highest-score').value) || 0
            };
            const { data } = await supabase.from('player_stats').select('id').eq('player_name', name).maybeSingle();
            if(data) await supabase.from('player_stats').update(payload).eq('id', data.id);
            else await supabase.from('player_stats').insert(payload);
            alert("Leaderboard tally modified.");
        }

        window.onload = fetchCurrentData;
    </script>
</body>
</html>
