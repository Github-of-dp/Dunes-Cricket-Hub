<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes FM - Full Control Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        command: {
                            bgCanvas: '#0A0A0A',     /* Pitch-Black */
                            card: '#16161A',         /* Container blocks */
                            border: '#24242B',       /* Frame lines */
                            accentYellow: '#FACC15', /* Realtime scorecard accent */
                            accentGreen: '#10B981',  /* Standings emerald accent */
                            accentPurple: '#A855F7', /* Player Stats Purple Accent */
                            accentBlue: '#0EA5E9',   /* Fixtures cyan accent */
                            textMain: '#F3F4F6',     /* White */
                            textMuted: '#9CA3AF',    /* Gray */
                            inputBg: '#0F0F12'       /* Inputs background */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-command-bgCanvas text-command-textMain font-sans min-h-screen antialiased p-4 pb-16">

    <main class="max-w-xl mx-auto space-y-8 mt-4">
        
        <div class="text-center space-y-1">
            <h1 class="text-xl font-black tracking-wider text-command-accentYellow uppercase">Dunes FM Command Center</h1>
            <p class="text-xs font-bold text-command-textMuted uppercase tracking-widest">Tournament Administration Console</p>
        </div>

        <section class="bg-command-card border border-command-border rounded-2xl p-6 shadow-xl relative space-y-6">
            <div class="absolute top-0 right-0 bg-command-accentYellow text-black text-[9px] font-black px-2.5 py-0.5 rounded-bl-xl uppercase tracking-wider">
                Console 01
            </div>

            <h2 class="text-xs font-black tracking-wider text-command-accentYellow uppercase flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-command-accentYellow animate-pulse"></span>
                1. Real-Time Score Engine
            </h2>

            <div class="grid grid-cols-3 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Runs</label>
                    <input type="number" id="input-runs" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-command-accentYellow">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Wickets</label>
                    <input type="number" id="input-wickets" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-command-accentYellow">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Overs</label>
                    <input type="text" id="input-overs" placeholder="0.0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-command-accentYellow">
                </div>
            </div>

            <div class="border-t border-command-border/60 pt-4 space-y-4">
                <h3 class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Live Crease Matrix Allocator</h3>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-accentYellow uppercase">* Batsman On Strike</label>
                        <input type="text" id="input-bat1" placeholder="Player Name" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentYellow">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Striker Stats</label>
                        <input type="text" id="input-bat1-stats" placeholder="e.g., 24 (12)" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-mono text-white focus:outline-none focus:border-command-accentYellow">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Batsman Off Strike</label>
                        <input type="text" id="input-bat2" placeholder="Player Name" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentYellow">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Non-Striker Stats</label>
                        <input type="text" id="input-bat2-stats" placeholder="e.g., 12 (8)" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-mono text-white focus:outline-none focus:border-command-accentYellow">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Active Bowler</label>
                        <input type="text" id="input-bowler" placeholder="Bowler Name" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentYellow">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Bowler Stats</label>
                        <input type="text" id="input-bowler-stats" placeholder="O - M - R - W" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-mono text-white focus:outline-none focus:border-command-accentYellow">
                    </div>
                </div>
            </div>

            <div class="space-y-1 border-t border-command-border/60 pt-4">
                <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Ball Commentary Update</label>
                <input type="text" id="input-commentary" placeholder="----------------------------------------" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-medium text-white focus:outline-none focus:border-command-accentYellow">
            </div>

            <div class="grid grid-cols-2 gap-3 border-t border-command-border/60 pt-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Batting House</label>
                    <select id="input-batting-team" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentYellow">
                        <option value="GREEN HOUSE">GREEN HOUSE</option>
                        <option value="BLUE HOUSE">BLUE HOUSE</option>
                        <option value="YELLOW HOUSE">YELLOW HOUSE</option>
                        <option value="RED HOUSE">RED HOUSE</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Bowling House</label>
                    <select id="input-bowling-team" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentYellow">
                        <option value="GREEN HOUSE">GREEN HOUSE</option>
                        <option value="BLUE HOUSE">BLUE HOUSE</option>
                        <option value="YELLOW HOUSE">YELLOW HOUSE</option>
                        <option value="RED HOUSE">RED HOUSE</option>
                    </select>
                </div>
            </div>

            <button onclick="broadcastData()" class="w-full bg-command-accentYellow text-black py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:opacity-90 transition shadow-lg">
                Broadcast Live Update
            </button>
        </section>

        <section class="bg-command-card border border-command-border rounded-2xl p-6 shadow-xl relative space-y-5">
            <div class="absolute top-0 right-0 bg-command-accentGreen text-black text-[9px] font-black px-2.5 py-0.5 rounded-bl-xl uppercase tracking-wider">
                Console 02
            </div>

            <h2 class="text-xs font-black tracking-wider text-command-accentGreen uppercase flex items-center gap-2">
                2. Standings Matrix Modifier
            </h2>

            <div class="space-y-1">
                <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Select Target House Table Row</label>
                <select id="select-house" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2.5 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentGreen">
                    <option value="GREEN HOUSE">GREEN HOUSE</option>
                    <option value="RED HOUSE">RED HOUSE</option>
                    <option value="YELLOW HOUSE">YELLOW HOUSE</option>
                    <option value="BLUE HOUSE">BLUE HOUSE</option>
                </select>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Played (P)</label>
                    <input type="number" id="input-played" value="0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-command-accentGreen">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Won (W)</label>
                    <input type="number" id="input-won" value="0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-command-accentGreen">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Lost (L)</label>
                    <input type="number" id="input-lost" value="0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-command-accentGreen">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Points (PTS)</label>
                    <input type="number" id="input-pts" value="0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-command-accentGreen">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Net Run Rate (NRR)</label>
                    <input type="text" id="input-nrr" value="0.000" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-mono text-white focus:outline-none focus:border-command-accentGreen">
                </div>
            </div>

            <button onclick="pushStandingsMatrix()" class="w-full bg-command-accentGreen text-black py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:opacity-90 transition shadow-lg">
                Push Standing Matrix Update
            </button>
        </section>

        <section class="bg-command-card border border-command-border rounded-2xl p-6 shadow-xl relative space-y-5">
            <div class="absolute top-0 right-0 bg-command-accentPurple text-white text-[9px] font-black px-2.5 py-0.5 rounded-bl-xl uppercase tracking-wider">
                Console 03
            </div>

            <h2 class="text-xs font-black tracking-wider text-command-accentPurple uppercase flex items-center gap-2">
                3. Player Leaderboard Allocator
            </h2>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Player Name</label>
                    <input type="text" id="stat-player-name" placeholder="e.g., Dhrupad Manoj" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-command-accentPurple">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">House Stream</label>
                    <select id="stat-house-name" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2.5 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentPurple">
                        <option value="GREEN HOUSE">GREEN HOUSE</option>
                        <option value="BLUE HOUSE">BLUE HOUSE</option>
                        <option value="YELLOW HOUSE">YELLOW HOUSE</option>
                        <option value="RED HOUSE">RED HOUSE</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Total Runs</label>
                    <input type="number" id="stat-total-runs" value="0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-command-accentPurple">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Total Wickets</label>
                    <input type="number" id="stat-total-wickets" value="0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-command-accentPurple">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Highest Score</label>
                    <input type="number" id="stat-highest-score" value="0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-command-accentPurple">
                </div>
            </div>

            <button onclick="pushPlayerTally()" class="w-full bg-command-accentPurple text-white py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:opacity-90 transition shadow-lg">
                Upsert Player Performance Stats
            </button>
        </section>

        <section class="bg-command-card border border-command-border rounded-2xl p-6 shadow-xl relative space-y-5">
            <div class="absolute top-0 right-0 bg-command-accentBlue text-black text-[9px] font-black px-2.5 py-0.5 rounded-bl-xl uppercase tracking-wider">
                Console 04
            </div>

            <h2 class="text-xs font-black tracking-wider text-command-accentBlue uppercase flex items-center gap-2">
                4. Fixtures Stream Allocator
            </h2>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Match Number</label>
                    <select id="select-match" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2.5 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentBlue">
                        <option value="1">Match 01</option>
                        <option value="2">Match 02</option>
                        <option value="3">Match 03</option>
                        <option value="4">Match 04</option>
                        <option value="5">Match 05</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Time Status Badge</label>
                    <select id="select-status" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2.5 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentBlue">
                        <option value="UPCOMING">UPCOMING</option>
                        <option value="LIVE">LIVE</option>
                        <option value="COMPLETED">COMPLETED</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Match Lineup Description</label>
                <input type="text" id="input-lineup" placeholder="GREEN HOUSE VS RED HOUSE" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentBlue">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Result Summary Line</label>
                <input type="text" id="input-summary" placeholder="Match Schedule summary details line" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentBlue">
            </div>

            <button onclick="updateFixtureSlot()" class="w-full bg-command-accentBlue text-black py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:opacity-90 transition shadow-lg">
                Update Fixture Slot Info
            </button>
        </section>

    </main>

    <script>
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 
        const supabaseConnection = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchCurrentData() {
            const { data } = await supabaseConnection.from('live_match').select('*').eq('id', 1).maybeSingle();
            if (data) {
                document.getElementById('input-runs').value = data.runs ?? 0;
                document.getElementById('input-wickets').value = data.wickets ?? 0;
                document.getElementById('input-overs').value = data.overs || "0.0";
                document.getElementById('input-commentary').value = data.commentary || "";
                document.getElementById('input-batting-team').value = data.batting_team || "GREEN HOUSE";
                document.getElementById('input-bowling-team').value = data.bowling_team || "RED HOUSE";
                document.getElementById('input-bat1').value = data.batsman_on_strike || "";
                document.getElementById('input-bat1-stats').value = data.batsman_on_strike_stats || "";
                document.getElementById('input-bat2').value = data.batsman_off_strike || "";
                document.getElementById('input-bat2-stats').value = data.batsman_off_strike_stats || "";
                document.getElementById('input-bowler').value = data.current_bowler || "";
                document.getElementById('input-bowler-stats').value = data.current_bowler_stats || "";
            }
        }

        async function broadcastData() {
            const updatePayload = {
                runs: parseInt(document.getElementById('input-runs').value) || 0,
                wickets: parseInt(document.getElementById('input-wickets').value) || 0,
                overs: document.getElementById('input-overs').value,
                commentary: document.getElementById('input-commentary').value,
                batting_team: document.getElementById('input-batting-team').value,
                bowling_team: document.getElementById('input-bowling-team').value,
                batsman_on_strike: document.getElementById('input-bat1').value,
                batsman_on_strike_stats: document.getElementById('input-bat1-stats').value,
                batsman_off_strike: document.getElementById('input-bat2').value,
                batsman_off_strike_stats: document.getElementById('input-bat2-stats').value,
                current_bowler: document.getElementById('input-bowler').value,
                current_bowler_stats: document.getElementById('input-bowler-stats').value
            };
            const { error } = await supabaseConnection.from('live_match').update(updatePayload).eq('id', 1);
            if (error) alert(error.message); else alert("Console 01: Score & Crease updated!");
        }

        async function pushStandingsMatrix() {
            const house = document.getElementById('select-house').value;
            const payload = {
                played: parseInt(document.getElementById('input-played').value) || 0,
                won: parseInt(document.getElementById('input-won').value) || 0,
                lost: parseInt(document.getElementById('input-lost').value) || 0,
                points: parseInt(document.getElementById('input-pts').value) || 0,
                nrr: document.getElementById('input-nrr').value
            };
            const { error } = await supabaseConnection.from('points_table').update(payload).eq('house_name', house);
            if (error) alert(error.message); else alert(`Console 02: ${house} Standings updated!`);
        }

        async function pushPlayerTally() {
            const name = document.getElementById('stat-player-name').value.trim();
            if(!name) return alert("Please enter player name");

            const payload = {
                player_name: name,
                house_name: document.getElementById('stat-house-name').value,
                total_runs: parseInt(document.getElementById('stat-total-runs').value) || 0,
                total_wickets: parseInt(document.getElementById('stat-total-wickets').value) || 0,
                highest_score: parseInt(document.getElementById('stat-highest-score').value) || 0
            };

            // Upsert mechanism: check if player already exists to update them, or insert fresh row
            const { data } = await supabaseConnection.from('player_stats').select('id').eq('player_name', name).maybeSingle();
            
            let result;
            if(data) {
                result = await supabaseConnection.from('player_stats').update(payload).eq('id', data.id);
            } else {
                result = await supabaseConnection.from('player_stats').insert(payload);
            }

            if (result.error) alert(result.error.message);
            else alert(`Console 03: Performance logged for ${name}!`);
        }

        async function updateFixtureSlot() {
            const num = parseInt(document.getElementById('select-match').value);
            const payload = {
                time_status: document.getElementById('select-status').value,
                teams: document.getElementById('input-lineup').value,
                result_summary: document.getElementById('input-summary').value
            };
            const { error } = await supabaseConnection.from('fixtures').update(payload).eq('match_num', num);
            if (error) alert(error.message); else alert(`Console 04: Match 0${num} updated!`);
        }

        fetchCurrentData();
    </script>
</body>
</html>
