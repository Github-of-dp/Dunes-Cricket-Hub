<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes FM - Scorer Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        command: {
                            bgCanvas: '#0A0A0A',     /* Pitch-Black Background */
                            card: '#16161A',         /* Sleek Container Blocks */
                            border: '#24242B',       /* Subtle Frame Lines */
                            accentGreen: '#10B981',  /* Emerald Broadcast Green Accent */
                            textMain: '#F3F4F6',     /* Bright Off-White */
                            textMuted: '#9CA3AF',    /* Soft Gray */
                            inputBg: '#0F0F12'       /* Insert Backgrounds */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-command-bgCanvas text-command-textMain font-sans min-h-screen antialiased p-4">

    <main class="max-w-xl mx-auto space-y-6 mt-4">
        
        <div class="text-center space-y-1">
            <h1 class="text-xl font-black tracking-wider text-command-accentGreen uppercase">Dunes FM Command Center</h1>
            <p class="text-xs font-bold text-command-textMuted uppercase tracking-widest">Tournament Administration Console</p>
        </div>

        <section class="bg-command-card border border-command-border rounded-2xl p-6 shadow-xl relative space-y-6">
            <div class="absolute top-0 right-0 bg-command-accentGreen text-command-bgCanvas text-[9px] font-black px-2.5 py-0.5 rounded-bl-xl uppercase tracking-wider">
                Console 01
            </div>

            <h2 class="text-xs font-black tracking-wider text-command-accentGreen uppercase flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-command-accentGreen animate-pulse"></span>
                1. Real-Time Score Engine
            </h2>

            <div class="grid grid-cols-3 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Runs</label>
                    <input type="number" id= "input-runs" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-command-accentGreen">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Wickets</label>
                    <input type="number" id="input-wickets" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-command-accentGreen">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Overs</label>
                    <input type="text" id="input-overs" placeholder="0.0" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-command-accentGreen">
                </div>
            </div>

            <div class="border-t border-command-border/60 pt-4 space-y-4">
                <h3 class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Live Crease Matrix Allocator</h3>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-accentGreen uppercase">* Batsman On Strike</label>
                        <input type="text" id="input-bat1" placeholder="Player Name" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentGreen">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Striker Stats</label>
                        <input type="text" id="input-bat1-stats" placeholder="e.g., 24 (12)" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-mono text-white focus:outline-none focus:border-command-accentGreen">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Batsman Off Strike</label>
                        <input type="text" id="input-bat2" placeholder="Player Name" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentGreen">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Non-Striker Stats</label>
                        <input type="text" id="input-bat2-stats" placeholder="e.g., 12 (8)" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-mono text-white focus:outline-none focus:border-command-accentGreen">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Active Bowler</label>
                        <input type="text" id="input-bowler" placeholder="Bowler Name" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-semibold text-white focus:outline-none focus:border-command-accentGreen">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-command-textMuted uppercase">Bowler Stats</label>
                        <input type="text" id="input-bowler-stats" placeholder="O - M - R - W" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-mono text-white focus:outline-none focus:border-command-accentGreen">
                    </div>
                </div>
            </div>

            <div class="space-y-1 border-t border-command-border/60 pt-4">
                <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Ball Commentary Update</label>
                <input type="text" id="input-commentary" placeholder="e.g., FOUR! Cracking shot through extra cover." class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-medium text-white focus:outline-none focus:border-command-accentGreen">
            </div>

            <div class="grid grid-cols-2 gap-3 border-t border-command-border/60 pt-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Batting House</label>
                    <input type="text" id="input-batting-team" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentGreen">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black tracking-wider text-command-textMuted uppercase">Bowling House</label>
                    <input type="text" id="input-bowling-team" class="w-full bg-command-inputBg border border-command-border rounded-lg px-3 py-2 text-xs font-bold uppercase text-white focus:outline-none focus:border-command-accentGreen">
                </div>
            </div>

            <button onclick="broadcastData()" class="w-full bg-command-accentGreen text-command-bgCanvas py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:opacity-90 transition shadow-lg">
                Broadcast Live Update
            </button>
        </section>
    </main>

    <script>
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 

        const supabaseConnection = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Fetch current snapshot to populate dashboard inputs on start
        async function fetchCurrentData() {
            const { data } = await supabaseConnection.from('live_match').select('*').eq('id', 1).maybeSingle();
            if (data) {
                document.getElementById('input-runs').value = data.runs ?? 0;
                document.getElementById('input-wickets').value = data.wickets ?? 0;
                document.getElementById('input-overs').value = data.overs || "0.0";
                document.getElementById('input-commentary').value = data.commentary || "";
                document.getElementById('input-batting-team').value = data.batting_team || "";
                document.getElementById('input-bowling-team').value = data.bowling_team || "";
                
                // Live Player Fields
                document.getElementById('input-bat1').value = data.batsman_on_strike || "";
                document.getElementById('input-bat1-stats').value = data.batsman_on_strike_stats || "";
                document.getElementById('input-bat2').value = data.batsman_off_strike || "";
                document.getElementById('input-bat2-stats').value = data.batsman_off_strike_stats || "";
                document.getElementById('input-bowler').value = data.current_bowler || "";
                document.getElementById('input-bowler-stats').value = data.current_bowler_stats || "";
            }
        }

        // Push everything to Supabase in a single payload write
        async function broadcastData() {
            const updatePayload = {
                runs: parseInt(document.getElementById('input-runs').value) || 0,
                wickets: parseInt(document.getElementById('input-wickets').value) || 0,
                overs: document.getElementById('input-overs').value,
                commentary: document.getElementById('input-commentary').value,
                batting_team: document.getElementById('input-batting-team').value,
                bowling_team: document.getElementById('input-bowling-team').value,
                
                // Mapping the new tracking columns
                batsman_on_strike: document.getElementById('input-bat1').value,
                batsman_on_strike_stats: document.getElementById('input-bat1-stats').value,
                batsman_off_strike: document.getElementById('input-bat2').value,
                batsman_off_strike_stats: document.getElementById('input-bat2-stats').value,
                current_bowler: document.getElementById('input-bowler').value,
                current_bowler_stats: document.getElementById('input-bowler-stats').value
            };

            const { error } = await supabaseConnection.from('live_match').update(updatePayload).eq('id', 1);
            if (error) {
                alert("Error broadcasting: " + error.message);
            } else {
                console.log("Broadcast successful!");
            }
        }

        fetchCurrentData();
    </script>
</body>
</html>
