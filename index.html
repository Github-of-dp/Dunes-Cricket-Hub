<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes - CrickHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cricket: {
                            maroon: '#631B26',       /* Rich Anchoring Maroon */
                            maroonHover: '#4A121B',
                            yellow: '#FACC15',       /* High-Energy Vibrant Yellow */
                            yellowLight: '#FEF08A',  /* Soft Pastel Accent Yellow */
                            pastelGreen: '#EAF5EE',  /* Clean Mint Green Base Canvas */
                            sheet: '#FFFFFF',       /* Crisp White Scorecard Backdrops */
                            borderGreen: '#C6E2D0',  /* Subtle Mint Wireframes */
                            textDark: '#1A241F'      /* Deep Roasted Charcoal for text contrast */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cricket-pastelGreen text-cricket-textDark font-sans min-h-screen selection:bg-cricket-maroon selection:text-white antialiased">

    <header class="border-b border-cricket-borderGreen bg-cricket-maroon px-4 py-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-cricket-yellow animate-pulse"></div>
                <div class="flex items-center font-black tracking-tight text-xl uppercase">
                    <span class="text-cricket-yellowLight">Dunes</span>
                    <span class="mx-1.5 text-white/30 font-light text-lg">/</span>
                    <span class="text-white">CrickHub</span>
                </div>
            </div>
            <span class="text-[10px] font-black px-3 py-1 bg-cricket-yellow text-cricket-maroon rounded-full tracking-widest uppercase shadow-sm">
                DUNES FM LIVE
            </span>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="grid grid-cols-3 bg-cricket-sheet border border-cricket-borderGreen p-1 rounded-xl shadow-sm">
            <button id="tab-live" onclick="switchTab('live')" class="py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-cricket-maroon text-white shadow shadow-cricket-maroon/20">Live Hub</button>
            <button id="tab-points" onclick="switchTab('points')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-cricket-textDark/60 hover:text-cricket-maroon">Points Table</button>
            <button id="tab-fixtures" onclick="switchTab('fixtures')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-cricket-textDark/60 hover:text-cricket-maroon">Fixtures</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6 space-y-8">

        <div id="view-live-section" class="space-y-6">
            <section class="bg-cricket-sheet border border-cricket-borderGreen rounded-2xl p-6 shadow-md relative overflow-hidden">
                <div class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[linear-gradient(to_right,#000_1px,transparent_1px),linear-gradient(to_bottom,#000_1px,transparent_1px)] bg-[size:24px_24px]"></div>
                
                <div class="relative z-10 space-y-6">
                    <div class="flex justify-between items-center border-b border-stone-100 pb-4">
                        <div>
                            <span class="text-[10px] font-black tracking-widest text-cricket-maroon uppercase">Batting</span>
                            <h2 id="view-batting" class="text-2xl font-black uppercase tracking-tight text-cricket-textDark mt-0.5">Loading...</h2>
                        </div>
                        <div class="text-center font-black text-cricket-maroon px-3 py-1 bg-cricket-yellow rounded-lg text-xs border border-cricket-yellow/20 shadow-sm">VS</div>
                        <div class="text-right">
                            <span class="text-[10px] font-black tracking-widest text-cricket-textDark/50 uppercase">Bowling</span>
                            <h2 id="view-bowling" class="text-2xl font-black uppercase tracking-tight text-stone-400 mt-0.5">Loading...</h2>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-baseline py-4">
                        <div class="text-6xl sm:text-7xl font-black tracking-tighter text-cricket-textDark">
                            <span id="view-runs">0</span><span class="text-stone-300 font-light">/</span><span id="view-wickets" class="text-cricket-maroon">0</span>
                        </div>
                        <div class="text-right">
                            <div class="text-cricket-textDark/50 text-xs font-bold uppercase tracking-wider">Overs</div>
                            <div id="view-overs" class="text-3xl sm:text-4xl font-black text-cricket-maroon tracking-tight mt-0.5">0.0</div>
                        </div>
                    </div>
                    
                    <div class="bg-cricket-pastelGreen/60 border border-cricket-borderGreen rounded-xl p-4 flex gap-3 items-start shadow-inner">
                        <span class="text-[10px] font-black bg-cricket-yellow text-cricket-maroon px-2 py-0.5 rounded uppercase tracking-wider mt-0.5 shrink-0 shadow-sm border border-cricket-yellow/20">LATEST</span>
                        <p id="view-commentary" class="text-sm font-semibold text-cricket-textDark italic">Connecting to field scoring feed...</p>
                    </div>
                </div>
            </section>
        </div>

        <div id="view-points-section" class="hidden space-y-4">
            <div class="bg-cricket-sheet border border-cricket-borderGreen rounded-2xl overflow-hidden shadow-md">
                <div class="p-5 border-b border-cricket-borderGreen/60 bg-cricket-pastelGreen/40 flex justify-between items-center">
                    <h3 class="font-black text-lg uppercase tracking-tight text-cricket-maroon">Standings Matrix</h3>
                    <div class="w-2 h-2 rounded-full bg-cricket-yellow animate-pulse"></div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-cricket-maroon text-cricket-yellowLight text-[11px] font-black uppercase tracking-wider border-b border-cricket-maroonHover">
                                <th class="py-4 px-6">House</th>
                                <th class="py-4 px-4 text-center">P</th>
                                <th class="py-4 px-4 text-center">W</th>
                                <th class="py-4 px-4 text-center">L</th>
                                <th class="py-4 px-4 text-center text-cricket-yellow font-black">Pts</th>
                                <th class="py-4 px-6 text-right">NRR</th>
                            </tr>
                        </thead>
                        <tbody id="points-table-rows" class="divide-y divide-cricket-pastelGreen font-semibold text-sm text-cricket-textDark"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-fixtures-section" class="hidden space-y-4">
            <div id="fixtures-container" class="grid gap-4 sm:grid-cols-2"></div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 

        const supabaseConnection = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function switchTab(activeTab) {
            const tabs = ['live', 'points', 'fixtures'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                const view = document.getElementById(`view-${tab}-section`);
                if (tab === activeTab) {
                    btn.className = "py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-cricket-maroon text-white shadow shadow-cricket-maroon/20";
                    view.classList.remove('hidden');
                } else {
                    btn.className = "py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-cricket-textDark/60 hover:text-cricket-maroon";
                    view.classList.add('hidden');
                }
            });
            if(activeTab === 'points') fetchPointsTable();
            if(activeTab === 'fixtures') fetchFixtures();
        }

        async function fetchLiveScore() {
            try {
                const { data, error } = await supabaseConnection.from('live_match').select('*').eq('id', 1).maybeSingle();
                if (error) console.error("Fetch Live Error:", error);
                if (data) updateUI(data);
            } catch (err) {
                console.error("Connection caught error:", err);
            }
        }

        function updateUI(matchData) {
            if (!matchData) return;
            document.getElementById('view-batting').innerText = matchData.batting_team || "N/A";
            document.getElementById('view-bowling').innerText = matchData.bowling_team || "N/A";
            document.getElementById('view-runs').innerText = matchData.runs ?? 0;
            document.getElementById('view-wickets').innerText = matchData.wickets ?? 0;
            document.getElementById('view-overs').innerText = matchData.overs || "0.0";
            document.getElementById('view-commentary').innerText = matchData.commentary || "";
        }

        async function fetchPointsTable() {
            const { data } = await supabaseConnection.from('points_table').select('*').order('points', { ascending: false });
            if (data) {
                const container = document.getElementById('points-table-rows');
                container.innerHTML = '';
                data.forEach(row => {
                    container.innerHTML += `
                        <tr class="hover:bg-cricket-pastelGreen/40 transition">
                            <td class="py-4 px-6 font-black text-cricket-textDark uppercase tracking-wide">${row.house_name}</td>
                            <td class="py-4 px-4 text-center text-cricket-textDark/70">${row.played}</td>
                            <td class="py-4 px-4 text-center text-emerald-600 font-bold">${row.won}</td>
                            <td class="py-4 px-4 text-center text-rose-600 font-bold">${row.lost}</td>
                            <td class="py-4 px-4 text-center text-cricket-maroon font-black text-base">${row.points}</td>
                            <td class="py-4 px-6 text-right text-cricket-textDark/70 font-mono">${row.nrr}</td>
                        </tr>`;
                });
            }
        }

        async function fetchFixtures() {
            const { data } = await supabaseConnection.from('fixtures').select('*').order('match_num', { ascending: true });
            if (data) {
                const container = document.getElementById('fixtures-container');
                container.innerHTML = '';
                data.forEach(match => {
                    const isLive = match.time_status.toUpperCase() === 'LIVE';
                    container.innerHTML += `
                        <div class="bg-cricket-sheet border ${isLive ? 'border-cricket-maroon ring-1 ring-cricket-maroon/30 shadow-md' : 'border-cricket-borderGreen'} p-5 rounded-xl space-y-3 relative">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black text-cricket-textDark/40 uppercase tracking-wider">Match 0${match.match_num}</span>
                                <span class="text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest ${isLive ? 'bg-cricket-maroon text-white animate-pulse' : 'bg-cricket-pastelGreen text-cricket-textDark/60'}">${match.time_status}</span>
                            </div>
                            <h4 class="font-black text-md uppercase text-cricket-textDark tracking-tight">${match.teams}</h4>
                            <p class="text-xs font-semibold text-cricket-textDark/60 border-t border-stone-100 pt-2">${match.result_summary}</p>
                        </div>`;
                });
            }
        }

        supabaseConnection.channel('public:live_match').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'live_match' }, payload => {
            if(payload && payload.new) updateUI(payload.new);
        }).subscribe();

        fetchLiveScore();
    </script>
</body>
</html>
