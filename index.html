<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes - CrickHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#0F172A',      /* Clean Slate Dark */
                            accent: '#3B82F6',       /* Crisp Electric Blue */
                            bgCanvas: '#F8FAFC',     /* Ultra Light Gray/White Canvas */
                            card: '#FFFFFF',         /* Pure White Sheets */
                            border: '#E2E8F0',       /* Soft Minimal Border */
                            textDark: '#0F172A',     /* High Contrast Text */
                            textMuted: '#64748B'     /* Balanced Subtext */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bgCanvas text-brand-textDark font-sans min-h-screen selection:bg-brand-accent selection:text-white antialiased">

    <header class="border-b border-brand-border bg-brand-card/90 backdrop-blur sticky top-0 z-50 px-4 py-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-brand-accent animate-pulse"></div>
                <div class="flex items-center font-black tracking-tight text-xl uppercase">
                    <span class="text-brand-primary">Dunes</span>
                    <span class="mx-1.5 text-brand-textMuted/30 font-light text-lg">/</span>
                    <span class="text-brand-textMuted">CrickHub</span>
                </div>
            </div>
            <span class="text-[10px] font-black px-3 py-1 bg-brand-primary text-white rounded-full tracking-widest uppercase shadow-sm">
                DUNES FM LIVE
            </span>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="grid grid-cols-3 bg-brand-card border border-brand-border p-1 rounded-xl shadow-sm">
            <button id="tab-live" onclick="switchTab('live')" class="py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-brand-primary text-white shadow">Live Hub</button>
            <button id="tab-points" onclick="switchTab('points')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-brand-textMuted hover:text-brand-primary">Points Table</button>
            <button id="tab-fixtures" onclick="switchTab('fixtures')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-brand-textMuted hover:text-brand-primary">Fixtures</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6 space-y-8">

        <div id="view-live-section" class="space-y-6">
            <section class="bg-brand-card border border-brand-border rounded-2xl p-6 shadow-sm relative overflow-hidden">
                <div class="absolute inset-0 opacity-[0.02] pointer-events-none bg-[linear-gradient(to_right,#000_1px,transparent_1px),linear-gradient(to_bottom,#000_1px,transparent_1px)] bg-[size:24px_24px]"></div>
                
                <div class="relative z-10 space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                        <div>
                            <span class="text-[10px] font-black tracking-widest text-brand-accent uppercase">Batting</span>
                            <h2 id="view-batting" class="text-2xl font-black uppercase tracking-tight text-brand-textDark mt-0.5">Loading...</h2>
                        </div>
                        <div class="text-center font-black text-brand-textMuted px-3 py-1 bg-brand-bgCanvas rounded-lg text-xs border border-brand-border shadow-sm">VS</div>
                        <div class="text-right">
                            <span class="text-[10px] font-black tracking-widest text-brand-textMuted uppercase">Bowling</span>
                            <h2 id="view-bowling" class="text-2xl font-black uppercase tracking-tight text-slate-300 mt-0.5">Loading...</h2>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-baseline py-4">
                        <div class="text-6xl sm:text-7xl font-black tracking-tighter text-brand-textDark">
                            <span id="view-runs">0</span><span class="text-slate-300 font-light">/</span><span id="view-wickets" class="text-brand-accent">0</span>
                        </div>
                        <div class="text-right">
                            <div class="text-brand-textMuted text-xs font-bold uppercase tracking-wider">Overs</div>
                            <div id="view-overs" class="text-3xl sm:text-4xl font-black text-brand-primary tracking-tight mt-0.5">0.0</div>
                        </div>
                    </div>
                    
                    <div class="bg-brand-bgCanvas border border-brand-border rounded-xl p-4 flex gap-3 items-start shadow-inner">
                        <span class="text-[10px] font-black bg-brand-accent text-white px-2 py-0.5 rounded uppercase tracking-wider mt-0.5 shrink-0 shadow-sm">LATEST</span>
                        <p id="view-commentary" class="text-sm font-semibold text-brand-textDark italic">Connecting to field scoring feed...</p>
                    </div>
                </div>
            </section>
        </div>

        <div id="view-points-section" class="hidden space-y-4">
            <div class="bg-brand-card border border-brand-border rounded-2xl overflow-hidden shadow-sm">
                <div class="p-5 border-b border-brand-border bg-brand-bgCanvas/50">
                    <h3 class="font-black text-lg uppercase tracking-tight text-brand-primary">Standings Matrix</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-brand-bgCanvas text-brand-textMuted text-[11px] font-black uppercase tracking-wider border-b border-brand-border">
                                <th class="py-4 px-6">House</th>
                                <th class="py-4 px-4 text-center">P</th>
                                <th class="py-4 px-4 text-center">W</th>
                                <th class="py-4 px-4 text-center">L</th>
                                <th class="py-4 px-4 text-center text-brand-accent font-black">Pts</th>
                                <th class="py-4 px-6 text-right">NRR</th>
                            </tr>
                        </thead>
                        <tbody id="points-table-rows" class="divide-y divide-brand-bgCanvas font-semibold text-sm text-brand-textDark"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-fixtures-section" class="hidden space-y-4">
            <div id="fixtures-container" class="grid gap-4 sm:grid-cols-2"></div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 

        const supabaseConnection = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function switchTab(activeTab) {
            const tabs = ['live', 'points', 'fixtures'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                const view = document.getElementById(`view-${tab}-section`);
                if (tab === activeTab) {
                    btn.className = "py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-brand-primary text-white shadow";
                    view.classList.remove('hidden');
                } else {
                    btn.className = "py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-brand-textMuted hover:text-brand-primary";
                    view.classList.add('hidden');
                }
            });
            if(activeTab === 'points') fetchPointsTable();
            if(activeTab === 'fixtures') fetchFixtures();
        }

        async function fetchLiveScore() {
            try {
                const { data, error } = await supabaseConnection.from('live_match').select('*').eq('id', 1).maybeSingle();
                if (error) console.error("Fetch Live Error:", error);
                if (data) updateUI(data);
            } catch (err) {
                console.error("Connection caught error:", err);
            }
        }

        function updateUI(matchData) {
            if (!matchData) return;
            document.getElementById('view-batting').innerText = matchData.batting_team || "N/A";
            document.getElementById('view-bowling').innerText = matchData.bowling_team || "N/A";
            document.getElementById('view-runs').innerText = matchData.runs ?? 0;
            document.getElementById('view-wickets').innerText = matchData.wickets ?? 0;
            document.getElementById('view-overs').innerText = matchData.overs || "0.0";
            document.getElementById('view-commentary').innerText = matchData.commentary || "";
        }

        async function fetchPointsTable() {
            const { data } = await supabaseConnection.from('points_table').select('*').order('points', { ascending: false });
            if (data) {
                const container = document.getElementById('points-table-rows');
                container.innerHTML = '';
                data.forEach(row => {
                    container.innerHTML += `
                        <tr class="hover:bg-brand-bgCanvas transition">
                            <td class="py-4 px-6 font-black text-brand-textDark uppercase tracking-wide">${row.house_name}</td>
                            <td class="py-4 px-4 text-center text-brand-textMuted">${row.played}</td>
                            <td class="py-4 px-4 text-center text-emerald-600 font-bold">${row.won}</td>
                            <td class="py-4 px-4 text-center text-rose-600 font-bold">${row.lost}</td>
                            <td class="py-4 px-4 text-center text-brand-accent font-black text-base">${row.points}</td>
                            <td class="py-4 px-6 text-right text-brand-textMuted font-mono">${row.nrr}</td>
                        </tr>`;
                });
            }
        }

        async function fetchFixtures() {
            const { data } = await supabaseConnection.from('fixtures').select('*').order('match_num', { ascending: true });
            if (data) {
                const container = document.getElementById('fixtures-container');
                container.innerHTML = '';
                data.forEach(match => {
                    const isLive = match.time_status.toUpperCase() === 'LIVE';
                    container.innerHTML += `
                        <div class="bg-brand-card border ${isLive ? 'border-brand-accent ring-1 ring-brand-accent/30 shadow-md' : 'border-brand-border'} p-5 rounded-xl space-y-3 relative">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black text-brand-textMuted uppercase tracking-wider">Match 0${match.match_num}</span>
                                <span class="text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest ${isLive ? 'bg-brand-accent text-white animate-pulse' : 'bg-brand-bgCanvas text-brand-textMuted'}">${match.time_status}</span>
                            </div>
                            <h4 class="font-black text-md uppercase text-brand-textDark tracking-tight">${match.teams}</h4>
                            <p class="text-xs font-semibold text-brand-textMuted border-t border-slate-100 pt-2">${match.result_summary}</p>
                        </div>`;
                });
            }
        }

        supabaseConnection.channel('public:live_match').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'live_match' }, payload => {
            if(payload && payload.new) updateUI(payload.new);
        }).subscribe();

        fetchLiveScore();
    </script>
</body>
</html>
