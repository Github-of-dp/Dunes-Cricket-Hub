<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes - CrickHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tournament: {
                            anzac: '#DEA450',         /* Anzac Gold Highlight */
                            prairie: '#9B461F',       /* Prairie Sand Base Canvas */
                            plum: '#6A1D2F',          /* Persian Plum Burgundy */
                            plumMuted: '#4E1120',
                            tomThumb: '#354C3C',      /* Tom Thumb Dark Green */
                            textLight: '#FFF6E9'      /* High-contrast crisp light cream text */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-tournament-prairie text-tournament-textLight font-sans min-h-screen selection:bg-tournament-anzac selection:text-tournament-plum antialiased">

    <header class="border-b border-tournament-plum bg-tournament-tomThumb px-4 py-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-tournament-anzac animate-pulse"></div>
                <div class="flex items-center font-black tracking-tight text-xl uppercase">
                    <span class="text-tournament-anzac">Dunes</span>
                    <span class="mx-1.5 text-tournament-textLight/20 font-light text-lg">/</span>
                    <span class="text-tournament-textLight">CrickHub</span>
                </div>
            </div>
            <span class="text-[10px] font-black px-3 py-1 bg-tournament-anzac text-tournament-plum rounded-full tracking-widest uppercase shadow-sm">
                DUNES FM LIVE
            </span>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="grid grid-cols-3 bg-tournament-tomThumb/60 border border-tournament-tomThumb p-1 rounded-xl shadow-inner">
            <button id="tab-live" onclick="switchTab('live')" class="py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-tournament-anzac text-tournament-plum shadow">Live Hub</button>
            <button id="tab-points" onclick="switchTab('points')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-tournament-textLight/60 hover:text-tournament-anzac">Points Table</button>
            <button id="tab-fixtures" onclick="switchTab('fixtures')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-tournament-textLight/60 hover:text-tournament-anzac">Fixtures</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6 space-y-8">

        <div id="view-live-section" class="space-y-6">
            <section class="bg-tournament-tomThumb border border-tournament-tomThumb/40 rounded-2xl p-6 shadow-xl relative overflow-hidden">
                <div class="absolute inset-0 opacity-[0.04] pointer-events-none bg-[linear-gradient(to_right,#fff_1px,transparent_1px),linear-gradient(to_bottom,#fff_1px,transparent_1px)] bg-[size:24px_24px]"></div>
                
                <div class="relative z-10 space-y-6">
                    <div class="flex justify-between items-center border-b border-tournament-prairie pb-4">
                        <div>
                            <span class="text-[10px] font-black tracking-widest text-tournament-anzac uppercase">Batting</span>
                            <h2 id="view-batting" class="text-2xl font-black uppercase tracking-tight text-tournament-textLight mt-0.5">Loading...</h2>
                        </div>
                        <div class="text-center font-black text-tournament-textLight px-3 py-1 bg-tournament-plum rounded-lg text-xs border border-tournament-plumMuted shadow-sm">VS</div>
                        <div class="text-right">
                            <span class="text-[10px] font-black tracking-widest text-tournament-textLight/50 uppercase">Bowling</span>
                            <h2 id="view-bowling" class="text-2xl font-black uppercase tracking-tight text-tournament-textLight/70 mt-0.5">Loading...</h2>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-baseline py-4">
                        <div class="text-6xl sm:text-7xl font-black tracking-tighter text-tournament-anzac">
                            <span id="view-runs">0</span><span class="text-tournament-textLight/30 font-light">/</span><span id="view-wickets" class="text-tournament-textLight">0</span>
                        </div>
                        <div class="text-right">
                            <div class="text-tournament-textLight/50 text-xs font-bold uppercase tracking-wider">Overs</div>
                            <div id="view-overs" class="text-3xl sm:text-4xl font-black text-tournament-textLight tracking-tight mt-0.5">0.0</div>
                        </div>
                    </div>
                    
                    <div class="bg-tournament-plum border border-tournament-plumMuted rounded-xl p-4 flex gap-3 items-start shadow-inner">
                        <span class="text-[10px] font-black bg-tournament-anzac text-tournament-plum px-2 py-0.5 rounded uppercase tracking-wider mt-0.5 shadow-sm">LATEST</span>
                        <p id="view-commentary" class="text-sm font-semibold text-tournament-textLight italic">Connecting to field scoring feed...</p>
                    </div>
                </div>
            </section>
        </div>

        <div id="view-points-section" class="hidden space-y-4">
            <div class="bg-tournament-tomThumb border border-tournament-tomThumb/40 rounded-2xl overflow-hidden shadow-xl">
                <div class="p-5 border-b border-tournament-prairie bg-tournament-tomThumb/40 flex justify-between items-center">
                    <h3 class="font-black text-lg uppercase tracking-tight text-tournament-anzac">Standings Matrix</h3>
                    <div class="w-2 h-2 rounded-full bg-tournament-anzac animate-pulse"></div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-tournament-plum text-tournament-textLight text-[11px] font-black uppercase tracking-wider border-b border-tournament-plumMuted">
                                <th class="py-4 px-6">House</th>
                                <th class="py-4 px-4 text-center">P</th>
                                <th class="py-4 px-4 text-center">W</th>
                                <th class="py-4 px-4 text-center">L</th>
                                <th class="py-4 px-4 text-center text-tournament-anzac font-black">Pts</th>
                                <th class="py-4 px-6 text-right">NRR</th>
                            </tr>
                        </thead>
                        <tbody id="points-table-rows" class="divide-y divide-tournament-tomThumb/60 font-semibold text-sm text-tournament-textLight"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-fixtures-section" class="hidden space-y-4">
            <div id="fixtures-container" class="grid gap-4 sm:grid-cols-2"></div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 

        const supabaseConnection = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function switchTab(activeTab) {
            const tabs = ['live', 'points', 'fixtures'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                const view = document.getElementById(`view-${tab}-section`);
                if (tab === activeTab) {
                    btn.className = "py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-tournament-anzac text-tournament-plum shadow";
                    view.classList.remove('hidden');
                } else {
                    btn.className = "py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-tournament-textLight/60 hover:text-tournament-anzac";
                    view.classList.add('hidden');
                }
            });
            if(activeTab === 'points') fetchPointsTable();
            if(activeTab === 'fixtures') fetchFixtures();
        }

        async function fetchLiveScore() {
            try {
                const { data, error } = await supabaseConnection.from('live_match').select('*').eq('id', 1).maybeSingle();
                if (error) console.error("Fetch Live Error:", error);
                if (data) updateUI(data);
            } catch (err) {
                console.error("Connection caught error:", err);
            }
        }

        function updateUI(matchData) {
            if (!matchData) return;
            document.getElementById('view-batting').innerText = matchData.batting_team || "N/A";
            document.getElementById('view-bowling').innerText = matchData.bowling_team || "N/A";
            document.getElementById('view-runs').innerText = matchData.runs ?? 0;
            document.getElementById('view-wickets').innerText = matchData.wickets ?? 0;
            document.getElementById('view-overs').innerText = matchData.overs || "0.0";
            document.getElementById('view-commentary').innerText = matchData.commentary || "";
        }

        async function fetchPointsTable() {
            const { data } = await supabaseConnection.from('points_table').select('*').order('points', { ascending: false });
            if (data) {
                const container = document.getElementById('points-table-rows');
                container.innerHTML = '';
                data.forEach(row => {
                    container.innerHTML += `
                        <tr class="hover:bg-tournament-plum/30 transition">
                            <td class="py-4 px-6 font-black text-tournament-textLight uppercase tracking-wide">${row.house_name}</td>
                            <td class="py-4 px-4 text-center text-tournament-textLight/70">${row.played}</td>
                            <td class="py-4 px-4 text-center text-emerald-400 font-bold">${row.won}</td>
                            <td class="py-4 px-4 text-center text-rose-400 font-bold">${row.lost}</td>
                            <td class="py-4 px-4 text-center text-tournament-anzac font-black text-base">${row.points}</td>
                            <td class="py-4 px-6 text-right text-tournament-textLight/70 font-mono">${row.nrr}</td>
                        </tr>`;
                });
            }
        }

        async function fetchFixtures() {
            const { data } = await supabaseConnection.from('fixtures').select('*').order('match_num', { ascending: true });
            if (data) {
                const container = document.getElementById('fixtures-container');
                container.innerHTML = '';
                data.forEach(match => {
                    const isLive = match.time_status.toUpperCase() === 'LIVE';
                    container.innerHTML += `
                        <div class="bg-tournament-tomThumb border ${isLive ? 'border-tournament-anzac ring-1 ring-tournament-anzac/30 shadow-md' : 'border-tournament-tomThumb/40'} p-5 rounded-xl space-y-3 relative">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black text-tournament-textLight/40 uppercase tracking-wider">Match 0${match.match_num}</span>
                                <span class="text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest ${isLive ? 'bg-tournament-anzac text-tournament-plum animate-pulse' : 'bg-tournament-plum text-tournament-textLight/60'}">${match.time_status}</span>
                            </div>
                            <h4 class="font-black text-md uppercase text-tournament-textLight tracking-tight">${match.teams}</h4>
                            <p class="text-xs font-semibold text-tournament-textLight/60 border-t border-tournament-prairie pt-2">${match.result_summary}</p>
                        </div>`;
                });
            }
        }

        supabaseConnection.channel('public:live_match').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'live_match' }, payload => {
            if(payload && payload.new) updateUI(payload.new);
        }).subscribe();

        fetchLiveScore();
    </script>
</body>
</html>
