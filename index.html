<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes - CrickHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        crick: {
                            bgCanvas: '#0D0D0E',     /* Pitch Black background */
                            card: '#131316',         /* Card body gray background */
                            border: '#1F1F23',       /* Subtle card border gray */
                            textMain: '#FFFFFF',     /* Pure white text */
                            textMuted: '#71717A',    /* Dimmed gray text */
                            accentYellow: '#FACC15', /* Orange Cap Style Text Accent */
                            accentPurple: '#A855F7', /* Purple Cap Style Text Accent */
                            accentCyan: '#0EA5E9',   /* High Score Style Text Accent */
                            liveRed: '#EF4444'       /* Wicket live indicator color */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-crick-bgCanvas text-crick-textMain font-sans min-h-screen selection:bg-white selection:text-black antialiased">

    <header class="px-4 py-5 max-w-md mx-auto mt-2">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2.5">
                <div class="w-2.5 h-2.5 rounded-full bg-crick-liveRed animate-pulse"></div>
                <h1 class="font-black text-lg uppercase tracking-wider">Cricket Live Score</h1>
            </div>
            <span class="text-[10px] font-bold px-2.5 py-1 bg-crick-card border border-crick-border text-crick-textMuted rounded-full tracking-wider uppercase">
                Interhouse 2026
            </span>
        </div>
    </header>

    <nav class="max-w-md mx-auto px-4 mt-2">
        <div class="grid grid-cols-4 bg-crick-card/60 border border-crick-border p-1 rounded-xl gap-0.5">
            <button id="tab-live" onclick="switchTab('live')" class="py-2 text-[10px] font-black uppercase tracking-wider rounded-lg transition bg-white text-black font-bold shadow-sm">Live Hub</button>
            <button id="tab-points" onclick="switchTab('points')" class="py-2 text-[10px] font-bold uppercase tracking-wider rounded-lg transition text-crick-textMuted hover:text-white">Standings</button>
            <button id="tab-stats" onclick="switchTab('stats')" class="py-2 text-[10px] font-bold uppercase tracking-wider rounded-lg transition text-crick-textMuted hover:text-white">Player Stats</button>
            <button id="tab-fixtures" onclick="switchTab('fixtures')" class="py-2 text-[10px] font-bold uppercase tracking-wider rounded-lg transition text-crick-textMuted hover:text-white">Fixtures</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-4 space-y-6">

        <div id="view-live-section" class="space-y-4">
            <section class="bg-crick-card border border-crick-border rounded-2xl p-6 relative overflow-hidden shadow-2xl">
                <div class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[linear-gradient(to_right,#fff_1px,transparent_1px),linear-gradient(to_bottom,#fff_1px,transparent_1px)] bg-[size:20px_20px]"></div>
                
                <div class="relative z-10 space-y-6">
                    <div class="grid grid-cols-7 items-center justify-between">
                        <div class="col-span-3 space-y-0.5">
                            <span class="text-[10px] font-bold tracking-wider text-crick-accentYellow uppercase">Batting</span>
                            <h2 id="view-batting" class="text-base font-black uppercase tracking-tight leading-tight">Loading...</h2>
                        </div>
                        <div class="col-span-1 text-center font-bold text-crick-textMuted text-xs bg-crick-bgCanvas py-1 border border-crick-border rounded-md shadow-inner">vs</div>
                        <div class="col-span-3 text-right space-y-0.5">
                            <span class="text-[10px] font-bold tracking-wider text-crick-textMuted uppercase">Bowling</span>
                            <h2 id="view-bowling" class="text-base font-black uppercase tracking-tight text-crick-textMuted leading-tight">Loading...</h2>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-baseline pt-2">
                        <div class="text-6xl font-black tracking-tight select-none">
                            <span id="view-runs">0</span><span class="text-crick-textMuted/40 font-light mx-0.5">/</span><span id="view-wickets" class="text-crick-liveRed">0</span>
                        </div>
                        <div class="text-right">
                            <div class="text-crick-textMuted text-[10px] font-bold uppercase tracking-wider">Overs</div>
                            <div id="view-overs" class="text-3xl font-black tracking-tight text-white mt-0.5">0.0</div>
                        </div>
                    </div>

                    <div class="space-y-2.5 bg-black/30 border border-crick-border/60 rounded-xl p-3.5">
                        <div class="space-y-1.5 text-xs font-semibold">
                            <div class="flex justify-between items-center text-white">
                                <span class="flex items-center gap-1">
                                    <span class="text-crick-accentYellow font-bold animate-pulse">*</span>
                                    <span id="live-batsman-1">--</span>
                                </span>
                                <span id="live-batsman-1-stats" class="font-mono font-bold">--</span>
                            </div>
                            <div class="flex justify-between items-center text-crick-textMuted">
                                <span class="pl-2.5" id="live-batsman-2">--</span>
                                <span id="live-batsman-2-stats" class="font-mono">--</span>
                            </div>
                        </div>
                        <div class="border-t border-crick-border/50 my-1"></div>
                        <div class="flex justify-between items-center text-xs">
                            <span class="text-crick-textMuted font-semibold flex items-center gap-1.5">
                                <span class="w-1.5 h-1.5 rounded-full bg-crick-textMuted/40"></span>
                                <span id="live-bowler">--</span>
                            </span>
                            <span id="live-bowler-stats" class="font-mono font-bold text-white">--</span>
                        </div>
                    </div>
                    
                    <div class="bg-black/40 border border-crick-border/80 rounded-xl p-3 flex gap-3 items-center shadow-inner">
                        <span class="text-[9px] font-black bg-crick-accentYellow text-black px-2 py-1 rounded font-bold tracking-wider uppercase shrink-0">LATEST</span>
                        <p id="view-commentary" class="text-xs font-semibold text-crick-textMuted truncate">Connecting live data feeds...</p>
                    </div>
                </div>
            </section>
        </div>

        <div id="view-points-section" class="hidden space-y-4">
            <div class="bg-crick-card border border-crick-border rounded-2xl overflow-hidden shadow-xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-black/30 text-crick-textMuted text-[11px] font-bold border-b border-crick-border">
                                <th class="py-3.5 pl-4 pr-1 text-center w-8">#</th>
                                <th class="py-3.5 px-3">Team</th>
                                <th class="py-3.5 px-2 text-center w-12">M</th>
                                <th class="py-3.5 px-2 text-center w-12">W</th>
                                <th class="py-3.5 px-2 text-center w-12">L</th>
                                <th class="py-3.5 pl-2 pr-4 text-center w-14 text-white font-black">Pts</th>
                            </tr>
                        </thead>
                        <tbody id="points-table-rows" class="divide-y divide-crick-border/40 font-medium text-xs text-white">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-stats-section" class="hidden space-y-6">
            
            <div class="bg-crick-card border border-crick-border rounded-2xl overflow-hidden shadow-xl">
                <div class="p-4 border-b border-crick-border bg-gradient-to-r from-amber-500/10 to-transparent flex justify-between items-center">
                    <h3 class="font-black text-xs uppercase tracking-wider text-crick-accentYellow flex items-center gap-1.5">
                        <span>🍊</span> Orange Cap Leaderboard
                    </h3>
                    <span class="text-[9px] font-black bg-crick-accentYellow text-black px-2 py-0.5 rounded tracking-wider uppercase">Top 5 Runs</span>
                </div>
                <div class="p-2">
                    <table class="w-full text-left border-collapse">
                        <tbody id="leaderboard-runs-rows" class="divide-y divide-crick-border/30 text-xs font-semibold"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-crick-card border border-crick-border rounded-2xl overflow-hidden shadow-xl">
                <div class="p-4 border-b border-crick-border bg-gradient-to-r from-purple-500/10 to-transparent flex justify-between items-center">
                    <h3 class="font-black text-xs uppercase tracking-wider text-crick-accentPurple flex items-center gap-1.5">
                        <span>🧢</span> Purple Cap Leaderboard
                    </h3>
                    <span class="text-[9px] font-black bg-crick-accentPurple text-white px-2 py-0.5 rounded tracking-wider uppercase">Top 5 Wickets</span>
                </div>
                <div class="p-2">
                    <table class="w-full text-left border-collapse">
                        <tbody id="leaderboard-wickets-rows" class="divide-y divide-crick-border/30 text-xs font-semibold"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-crick-card border border-crick-border rounded-2xl overflow-hidden shadow-xl">
                <div class="p-4 border-b border-crick-border bg-gradient-to-r from-sky-500/10 to-transparent flex justify-between items-center">
                    <h3 class="font-black text-xs uppercase tracking-wider text-crick-accentCyan flex items-center gap-1.5">
                        <span>⚡</span> Highest Scores
                    </h3>
                    <span class="text-[9px] font-black bg-crick-accentCyan text-black px-2 py-0.5 rounded tracking-wider uppercase">Top 5 Max</span>
                </div>
                <div class="p-2">
                    <table class="w-full text-left border-collapse">
                        <tbody id="leaderboard-high-rows" class="divide-y divide-crick-border/30 text-xs font-semibold"></tbody>
                    </table>
                </div>
            </div>

        </div>

        <div id="view-fixtures-section" class="hidden space-y-4">
            <div id="fixtures-container" class="space-y-3"></div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 
        const supabaseConnection = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function switchTab(activeTab) {
            ['live', 'points', 'stats', 'fixtures'].forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                const view = document.getElementById(`view-${tab}-section`);
                if (tab === activeTab) {
                    btn.className = "py-2 text-[10px] font-black uppercase tracking-wider rounded-lg transition bg-white text-black font-bold shadow-sm";
                    view.classList.remove('hidden');
                } else {
                    btn.className = "py-2 text-[10px] font-bold uppercase tracking-wider rounded-lg transition text-crick-textMuted hover:text-white";
                    view.classList.add('hidden');
                }
            });
            if(activeTab === 'points') fetchPointsTable();
            if(activeTab === 'stats') fetchGoogleStyleLeaderboards();
            if(activeTab === 'fixtures') fetchFixtures();
        }

        async function fetchLiveScore() {
            const { data } = await supabaseConnection.from('live_match').select('*').eq('id', 1).maybeSingle();
            if (data) updateUI(data);
        }

        function updateUI(matchData) {
            if (!matchData) return;
            document.getElementById('view-batting').innerText = matchData.batting_team || "N/A";
            document.getElementById('view-bowling').innerText = matchData.bowling_team || "N/A";
            document.getElementById('view-runs').innerText = matchData.runs ?? 0;
            document.getElementById('view-wickets').innerText = matchData.wickets ?? 0;
            document.getElementById('view-overs').innerText = matchData.overs || "0.0";
            document.getElementById('view-commentary').innerText = matchData.commentary || "";
            document.getElementById('live-batsman-1').innerText = matchData.batsman_on_strike || "Striker";
            document.getElementById('live-batsman-1-stats').innerText = matchData.batsman_on_strike_stats || "0 (0b)";
            document.getElementById('live-batsman-2').innerText = matchData.batsman_off_strike || "Non-Striker";
            document.getElementById('live-batsman-2-stats').innerText = matchData.batsman_off_strike_stats || "0 (0b)";
            document.getElementById('live-bowler').innerText = matchData.current_bowler || "Bowler";
            document.getElementById('live-bowler-stats').innerText = matchData.current_bowler_stats || "0-0-0-0";
        }

        async function fetchPointsTable() {
            const { data } = await supabaseConnection.from('points_table').select('*').order('points', { ascending: false });
            if (data) {
                const container = document.getElementById('points-table-rows');
                container.innerHTML = '';
                data.forEach((row, index) => {
                    container.innerHTML += `
                        <tr class="hover:bg-white/[0.02] transition-colors items-center">
                            <td class="py-4 pl-4 pr-1 text-center font-bold text-crick-textMuted select-none">${index + 1}</td>
                            <td class="py-4 px-3 font-bold text-sm tracking-tight text-white uppercase">${row.house_name}</td>
                            <td class="py-4 px-2 text-center text-crick-textMuted font-semibold">${row.played}</td>
                            <td class="py-4 px-2 text-center text-crick-textMuted font-semibold">${row.won}</td>
                            <td class="py-4 px-2 text-center text-crick-textMuted font-semibold">${row.lost}</td>
                            <td class="py-4 pl-2 pr-4 text-center text-white font-black text-sm bg-white/[0.02]">${row.points}</td>
                        </tr>`;
                });
            }
        }

        async function fetchGoogleStyleLeaderboards() {
            const runsReq = await supabaseConnection.from('player_stats').select('*').order('total_runs', { ascending: false }).limit(5);
            if(runsReq.data) {
                const container = document.getElementById('leaderboard-runs-rows');
                container.innerHTML = '';
                runsReq.data.forEach((p, index) => {
                    container.innerHTML += `
                        <tr class="hover:bg-black/20 transition">
                            <td class="py-3 px-4 font-black text-white text-xs"><span class="text-crick-textMuted mr-1">#${index+1}</span> ${p.player_name}</td>
                            <td class="py-3 px-2 text-[10px] font-bold text-crick-textMuted uppercase">${p.house_name}</td>
                            <td class="py-3 px-4 text-right font-mono font-black text-crick-accentYellow text-sm">${p.total_runs}</td>
                        </tr>`;
                });
            }

            const wicketsReq = await supabaseConnection.from('player_stats').select('*').order('total_wickets', { ascending: false }).limit(5);
            if(wicketsReq.data) {
                const container = document.getElementById('leaderboard-wickets-rows');
                container.innerHTML = '';
                wicketsReq.data.forEach((p, index) => {
                    container.innerHTML += `
                        <tr class="hover:bg-black/20 transition">
                            <td class="py-3 px-4 font-black text-white text-xs"><span class="text-crick-textMuted mr-1">#${index+1}</span> ${p.player_name}</td>
                            <td class="py-3 px-2 text-[10px] font-bold text-crick-textMuted uppercase">${p.house_name}</td>
                            <td class="py-3 px-4 text-right font-mono font-black text-crick-accentPurple text-sm">${p.total_wickets}</td>
                        </tr>`;
                });
            }

            const highReq = await supabaseConnection.from('player_stats').select('*').order('highest_score', { ascending: false }).limit(5);
            if(highReq.data) {
                const container = document.getElementById('leaderboard-high-rows');
                container.innerHTML = '';
                highReq.data.forEach((p, index) => {
                    container.innerHTML += `
                        <tr class="hover:bg-black/20 transition">
                            <td class="py-3 px-4 font-black text-white text-xs"><span class="text-crick-textMuted mr-1">#${index+1}</span> ${p.player_name}</td>
                            <td class="py-3 px-2 text-[10px] font-bold text-crick-textMuted uppercase">${p.house_name}</td>
                            <td class="py-3 px-4 text-right font-mono font-black text-crick-accentCyan text-sm">${p.highest_score}</td>
                        </tr>`;
                });
            }
        }

        async function fetchFixtures() {
            const { data } = await supabaseConnection.from('fixtures').select('*').order('match_num', { ascending: true });
            if (data) {
                const container = document.getElementById('fixtures-container');
                container.innerHTML = '';
                data.forEach(match => {
                    const isLive = match.time_status.toUpperCase() === 'LIVE';
                    container.innerHTML += `
                        <div class="bg-crick-card border ${isLive ? 'border-crick-liveRed shadow-md' : 'border-crick-border'} p-4 rounded-xl space-y-2 relative">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-bold text-crick-textMuted uppercase tracking-wider">Match 0${match.match_num}</span>
                                <span class="text-[9px] font-black px-2 py-0.5 rounded uppercase tracking-widest ${isLive ? 'bg-crick-liveRed text-white animate-pulse' : 'bg-black/60 text-crick-textMuted border border-crick-border'}">${match.time_status}</span>
                            </div>
                            <h4 class="font-black text-sm uppercase text-white tracking-tight">${match.teams}</h4>
                            <p class="text-xs font-semibold text-crick-textMuted border-t border-crick-border/60 pt-2">${match.result_summary}</p>
                        </div>`;
                });
            }
        }

        supabaseConnection.channel('public:live_match').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'live_match' }, payload => {
            if(payload && payload.new) updateUI(payload.new);
        }).subscribe();

        fetchLiveScore();
    </script>
</body>
</html>
