<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes FM Sports Hub - Live Broadcast Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#060608] text-[#F9FAFB] p-6">

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-6">
            <section class="bg-[#111115] border border-gray-800 rounded-2xl p-6 relative">
                <div class="absolute top-0 right-0 bg-yellow-400 text-black text-[9px] font-black px-2 py-0.5 rounded-bl-lg uppercase tracking-wider">Live</div>
                
                <div class="flex justify-between items-center border-b border-gray-800 pb-3 mb-4">
                    <h2 id="live-matchup-title" class="text-sm font-black tracking-wide uppercase text-white">Awaiting Match Init...</h2>
                    <span id="live-overs-ticker" class="text-sm font-mono font-bold text-yellow-400">0.0 Overs</span>
                </div>

                <div class="flex items-baseline gap-1">
                    <span id="live-runs-display" class="text-6xl font-mono font-black text-white">0</span>
                    <span class="text-3xl font-mono text-gray-700">/</span>
                    <span id="live-wickets-display" class="text-4xl font-mono font-black text-yellow-400">0</span>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-gray-800/60 pt-4 mt-4">
                    <div class="bg-black/20 border border-gray-800 p-3 rounded-xl">
                        <div class="text-[9px] font-bold text-yellow-400 uppercase tracking-wide">Striker</div>
                        <div id="live-striker-name" class="text-xs font-black mt-1 text-white">-</div>
                    </div>
                    <div class="bg-black/20 border border-gray-800 p-3 rounded-xl">
                        <div class="text-[9px] font-bold text-gray-400 uppercase tracking-wide">Non-Striker</div>
                        <div id="live-nonstriker-name" class="text-xs font-semibold mt-1 text-gray-300">-</div>
                    </div>
                </div>

                <div class="mt-4 bg-[#09090C] border border-gray-800 rounded-xl p-3 flex gap-3 items-center">
                    <span class="text-[8px] font-black tracking-widest bg-yellow-400/10 text-yellow-400 px-2 py-0.5 rounded border border-yellow-400/20 uppercase animate-pulse">Event</span>
                    <p id="live-commentary-line" class="text-xs text-gray-300 font-medium">Waiting for first delivery matrix data transmission stream...</p>
                </div>
            </section>
        </div>

        <div class="space-y-6">
            <section class="bg-[#111115] border border-gray-800 rounded-2xl p-6">
                <h2 class="text-xs font-black text-emerald-400 uppercase tracking-wider mb-3">📊 House Standings Matrix</h2>
                <div class="overflow-x-auto text-xs">
                    <table class="w-full border-collapse text-left">
                        <thead>
                            <tr class="border-b border-gray-800 text-gray-400 font-bold">
                                <th class="pb-2">House</th>
                                <th class="pb-2 text-center">P</th>
                                <th class="pb-2 text-center">PTS</th>
                                <th class="pb-2 text-right text-emerald-400">NRR</th>
                            </tr>
                        </thead>
                        <tbody id="standings-body" class="divide-y divide-gray-800/40"></tbody>
                    </table>
                </div>
            </section>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function initDisplayStream() {
            // Fetch initial standings snapshot
            const { data: stdData } = await supabase.from('points_table').select('*').order('points', {ascending: false});
            const tbody = document.getElementById("standings-body");
            tbody.innerHTML = "";
            if(stdData) {
                stdData.forEach(r => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td class="py-2.5 font-bold text-white">${r.house_name}</td>
                        <td class="py-2.5 text-center text-gray-400">${r.played}</td>
                        <td class="py-2.5 text-center font-black text-white">${r.points}</td>
                        <td class="py-2.5 text-right font-mono text-emerald-400 font-bold">${r.net_run_rate || '0.000'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            // Establish listener pipeline for live match scores updates
            supabase.channel('score_stream')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'live_match', filter: 'id=eq.1' }, payload => {
                    const m = payload.new;
                    document.getElementById("live-runs-display").textContent = m.runs ?? 0;
                    document.getElementById("live-wickets-display").textContent = m.wickets ?? 0;
                    document.getElementById("live-overs-ticker").textContent = `${m.overs || '0.0'} Overs`;
                    document.getElementById("live-commentary-line").textContent = m.commentary || "";
                    document.getElementById("live-striker-name").textContent = m.batsman_on_strike || "-";
                    document.getElementById("live-nonstriker-name").textContent = m.batsman_off_strike || "-";
                }).subscribe();
        }

        initDisplayStream();
    </script>
</body>
</html>
