<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes - CrickHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        school: {
                            maroon: '#7A1C2C',    /* Rich Institutional Maroon */
                            maroonLight: '#942637',
                            cream: '#FDFBF7',     /* Clean Cream Base */
                            beige: '#EFE9DC',     /* Premium Accent Beige */
                            zincDark: '#0C0A09'   /* Matte Stone Black */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-school-zincDark text-zinc-100 font-sans min-h-screen selection:bg-school-maroon selection:text-white">

    <header class="border-b border-zinc-800 bg-stone-900/40 backdrop-blur sticky top-0 z-50 px-4 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse"></div>
                <div class="flex items-center font-black tracking-tight text-xl uppercase">
                    <span class="text-school-cream">Dunes</span>
                    <span class="mx-1.5 text-zinc-600 font-light text-lg">/</span>
                    <span class="bg-gradient-to-r from-school-beige to-school-maroonLight bg-clip-text text-transparent">CrickHub</span>
                </div>
            </div>
            <span class="text-[10px] font-black px-3 py-1 bg-school-maroon text-school-beige rounded-full border border-school-maroonLight/40 tracking-widest uppercase">
                Interhouse 2026
            </span>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="grid grid-cols-3 bg-stone-900/80 border border-zinc-800/80 p-1 rounded-xl">
            <button id="tab-live" onclick="switchTab('live')" class="py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-school-maroon text-school-cream shadow-md">Live Hub</button>
            <button id="tab-points" onclick="switchTab('points')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-zinc-400 hover:text-school-beige">Points Table</button>
            <button id="tab-fixtures" onclick="switchTab('fixtures')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-zinc-400 hover:text-school-beige">Fixtures</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6 space-y-8">

        <div id="view-live-section" class="space-y-6">
            <section class="bg-stone-900 border border-zinc-800/60 rounded-2xl p-6 shadow-2xl relative overflow-hidden">
                <div class="absolute inset-0 opacity-5 pointer-events-none bg-[linear-gradient(to_right,#808080_1px,transparent_1px),linear-gradient(to_bottom,#808080_1px,transparent_1px)] bg-[size:24px_24px]"></div>
                
                <div class="relative z-10 space-y-6">
                    <div class="flex justify-between items-center border-b border-zinc-800 pb-4">
                        <div>
                            <span class="text-[10px] font-black tracking-widest text-school-beige uppercase opacity-80">Batting</span>
                            <h2 id="view-batting" class="text-2xl font-black uppercase tracking-tight text-school-cream mt-0.5">Loading...</h2>
                        </div>
                        <div class="text-center font-black text-school-maroonLight px-3 py-1 bg-stone-950 rounded-lg text-xs border border-zinc-800">VS</div>
                        <div class="text-right">
                            <span class="text-[10px] font-black tracking-widest text-zinc-500 uppercase">Bowling</span>
                            <h2 id="view-bowling" class="text-2xl font-black uppercase tracking-tight text-zinc-400 mt-0.5">Loading...</h2>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-baseline py-4">
                        <div class="text-6xl sm:text-7xl font-black tracking-tighter text-school-cream">
                            <span id="view-runs">0</span><span class="text-zinc-600 font-light">/</span><span id="view-wickets" class="text-school-maroonLight">0</span>
                        </div>
                        <div class="text-right">
                            <div class="text-zinc-400 text-xs font-bold uppercase tracking-wider">Overs</div>
                            <div id="view-overs" class="text-3xl sm:text-4xl font-black text-school-beige tracking-tight mt-0.5">0.0</div>
                        </div>
                    </div>
                    
                    <div class="bg-stone-950 border border-school-maroon/20 rounded-xl p-4 flex gap-3 items-start">
                        <span class="text-[10px] font-black bg-school-beige text-school-maroon px-2 py-0.5 rounded uppercase tracking-wider mt-0.5 shrink-0">LATEST</span>
                        <p id="view-commentary" class="text-sm font-medium text-stone-300 italic">Connecting to field scoring feed...</p>
                    </div>
                </div>
            </section>
        </div>

        <div id="view-points-section" class="hidden space-y-4">
            <div class="bg-stone-900 border border-zinc-800/60 rounded-2xl overflow-hidden shadow-2xl">
                <div class="p-5 border-b border-zinc-800">
                    <h3 class="font-black text-lg uppercase tracking-tight text-school-cream">Standings Matrix</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-stone-950 text-zinc-400 text-[11px] font-black uppercase tracking-wider border-b border-zinc-800">
                                <th class="py-4 px-6">House</th>
                                <th class="py-4 px-4 text-center">P</th>
                                <th class="py-4 px-4 text-center">W</th>
                                <th class="py-4 px-4 text-center">L</th>
                                <th class="py-4 px-4 text-center text-school-beige">Pts</th>
                                <th class="py-4 px-6 text-right">NRR</th>
                            </tr>
                        </thead>
                        <tbody id="points-table-rows" class="divide-y divide-zinc-800/60 font-medium text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-fixtures-section" class="hidden space-y-4">
            <div id="fixtures-container" class="grid gap-4 sm:grid-cols-2"></div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 

        const supabaseConnection = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function switchTab(activeTab) {
            const tabs = ['live', 'points', 'fixtures'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                const view = document.getElementById(`view-${tab}-section`);
                if (tab === activeTab) {
                    btn.className = "py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-school-maroon text-school-cream shadow-md";
                    view.classList.remove('hidden');
                } else {
                    btn.className = "py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-zinc-400 hover:text-school-beige";
                    view.classList.add('hidden');
                }
            });
            if(activeTab === 'points') fetchPointsTable();
            if(activeTab === 'fixtures') fetchFixtures();
        }

        async function fetchLiveScore() {
            const { data } = await supabaseConnection.from('live_match').select('*').eq('id', 1).single();
            if (data) updateUI(data);
        }

        function updateUI(matchData) {
            document.getElementById('view-batting').innerText = matchData.batting_team;
            document.getElementById('view-bowling').innerText = matchData.bowling_team;
            document.getElementById('view-runs').innerText = matchData.runs;
            document.getElementById('view-wickets').innerText = matchData.wickets;
            document.getElementById('view-overs').innerText = matchData.overs;
            document.getElementById('view-commentary').innerText = matchData.commentary;
        }

        async function fetchPointsTable() {
            const { data } = await supabaseConnection.from('points_table').select('*').order('points', { ascending: false });
            if (data) {
                const container = document.getElementById('points-table-rows');
                container.innerHTML = '';
                data.forEach(row => {
                    container.innerHTML += `
                        <tr class="hover:bg-stone-900/40 transition">
                            <td class="py-4 px-6 font-black text-school-cream uppercase tracking-wide">${row.house_name}</td>
                            <td class="py-4 px-4 text-center text-zinc-400">${row.played}</td>
                            <td class="py-4 px-4 text-center text-emerald-500">${row.won}</td>
                            <td class="py-4 px-4 text-center text-rose-500">${row.lost}</td>
                            <td class="py-4 px-4 text-center text-school-beige font-black text-base">${row.points}</td>
                            <td class="py-4 px-6 text-right text-zinc-400 font-mono">${row.nrr}</td>
                        </tr>`;
                });
            }
        }

        async function fetchFixtures() {
            const { data } = await supabaseConnection.from('fixtures').select('*').order('match_num', { ascending: true });
            if (data) {
                const container = document.getElementById('fixtures-container');
                container.innerHTML = '';
                data.forEach(match => {
                    const isLive = match.time_status.toUpperCase() === 'LIVE';
                    container.innerHTML += `
                        <div class="bg-stone-900 border ${isLive ? 'border-school-maroonLight shadow-lg shadow-red-950/20' : 'border-zinc-800/80'} p-5 rounded-xl space-y-3 relative">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black text-zinc-500 uppercase tracking-wider">Match 0${match.match_num}</span>
                                <span class="text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest ${isLive ? 'bg-school-maroon text-school-cream animate-pulse' : 'bg-stone-950 text-zinc-400'}">${match.time_status}</span>
                            </div>
                            <h4 class="font-black text-md uppercase text-school-cream tracking-tight">${match.teams}</h4>
                            <p class="text-xs font-medium text-stone-400 border-t border-zinc-800/60 pt-2">${match.result_summary}</p>
                        </div>`;
                });
            }
        }

        supabaseConnection.channel('public:live_match').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'live_match' }, payload => {
            updateUI(payload.new);
        }).subscribe();

        fetchLiveScore();
    </script>
</body>
</html>
