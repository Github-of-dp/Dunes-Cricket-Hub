<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunes Interhouse Cricket Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen selection:bg-yellow-400 selection:text-black">

    <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur sticky top-0 z-50 px-4 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                <h1 class="text-xl font-black tracking-wider uppercase bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">DUNES FM LIVE SCORE</h1>
            </div>
            <span class="text-xs font-bold px-2.5 py-1 bg-zinc-800 rounded-full text-zinc-400 border border-zinc-700">INTERHOUSE 2026</span>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="grid grid-cols-3 bg-zinc-900 border border-zinc-800 p-1 rounded-xl">
            <button id="tab-live" onclick="switchTab('live')" class="py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-white text-black">Live Hub</button>
            <button id="tab-points" onclick="switchTab('points')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-zinc-400 hover:text-white">Points Table</button>
            <button id="tab-fixtures" onclick="switchTab('fixtures')" class="py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-zinc-400 hover:text-white">Fixtures</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6 space-y-8">

        <div id="view-live-section" class="space-y-6">
            <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl relative overflow-hidden">
                <div class="absolute inset-0 opacity-5 pointer-events-none bg-[linear-gradient(to_right,#808080_1px,transparent_1px),linear-gradient(to_bottom,#808080_1px,transparent_1px)] bg-[size:24px_24px]"></div>
                <div class="relative z-10 space-y-6">
                    <div class="flex justify-between items-center border-b border-zinc-800 pb-4">
                        <div>
                            <span class="text-xs font-black tracking-widest text-yellow-500 uppercase">Batting</span>
                            <h2 id="view-batting" class="text-2xl font-black uppercase tracking-tight text-white">Loading...</h2>
                        </div>
                        <div class="text-center font-bold text-zinc-500 px-3 py-1 bg-zinc-950 rounded-lg text-sm border border-zinc-800">VS</div>
                        <div class="text-right">
                            <span class="text-xs font-black tracking-widest text-zinc-500 uppercase">Bowling</span>
                            <h2 id="view-bowling" class="text-2xl font-black uppercase tracking-tight text-zinc-400">Loading...</h2>
                        </div>
                    </div>
                    <div class="flex justify-between items-baseline py-4">
                        <div class="text-6xl sm:text-7xl font-black tracking-tighter text-white">
                            <span id="view-runs">0</span><span class="text-zinc-500">/</span><span id="view-wickets" class="text-red-500">0</span>
                        </div>
                        <div class="text-right">
                            <div class="text-zinc-400 text-sm font-bold uppercase tracking-wider">Overs</div>
                            <div id="view-overs" class="text-3xl sm:text-4xl font-black text-white tracking-tight">0.0</div>
                        </div>
                    </div>
                    <div class="bg-zinc-950 border border-zinc-800/80 rounded-xl p-4 flex gap-3 items-start">
                        <span class="text-xs font-black bg-yellow-400 text-black px-2 py-0.5 rounded uppercase tracking-wide mt-0.5 shrink-0">LATEST</span>
                        <p id="view-commentary" class="text-sm font-medium text-zinc-300 italic">Connecting to field scoring feed...</p>
                    </div>
                </div>
            </section>
        </div>

        <div id="view-points-section" class="hidden space-y-4">
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl">
                <div class="p-5 border-b border-zinc-800">
                    <h3 class="font-black text-lg uppercase tracking-tight">Standings Matrix</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-zinc-950 text-zinc-400 text-[11px] font-black uppercase tracking-wider border-b border-zinc-800">
                                <th class="py-4 px-6">House</th>
                                <th class="py-4 px-4 text-center">P</th>
                                <th class="py-4 px-4 text-center">W</th>
                                <th class="py-4 px-4 text-center">L</th>
                                <th class="py-4 px-4 text-center text-yellow-400">Pts</th>
                                <th class="py-4 px-6 text-right">NRR</th>
                            </tr>
                        </thead>
                        <tbody id="points-table-rows" class="divide-y divide-zinc-800 font-medium text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-fixtures-section" class="hidden space-y-4">
            <div id="fixtures-container" class="grid gap-4 sm:grid-cols-2">
                </div>
        </div>

        <hr class="border-zinc-800">

        <section class="bg-zinc-900/40 border border-dashed border-zinc-800 rounded-2xl p-6 space-y-6">
            <div class="flex items-center justify-between border-b border-zinc-800/60 pb-3">
                <h3 class="text-sm font-bold uppercase tracking-wider text-zinc-400">Boundary Scorer Console</h3>
                <span class="text-[10px] uppercase font-black text-zinc-500 px-2 py-0.5 bg-zinc-950 rounded border border-zinc-800">Scorer Station</span>
            </div>
            
            <div class="space-y-4">
                <h4 class="text-xs font-black uppercase tracking-widest text-yellow-500">1. Score Stream Updates</h4>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-zinc-400 uppercase mb-1">Runs</label>
                        <input type="number" id="input-runs" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-white font-bold focus:outline-none focus:border-yellow-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-400 uppercase mb-1">Wickets</label>
                        <input type="number" id="input-wickets" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-white font-bold focus:outline-none focus:border-yellow-400" max="10">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-xs font-bold text-zinc-400 uppercase mb-1">Overs</label>
                        <input type="text" id="input-overs" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-white font-bold focus:outline-none focus:border-yellow-400">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-400 uppercase mb-1">Ball Commentary Update</label>
                    <input type="text" id="input-commentary" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-yellow-400">
                </div>
                <button id="btn-update" class="w-full bg-white hover:bg-zinc-200 text-black font-black uppercase text-sm py-3 rounded-xl transition duration-200 tracking-wider shadow-lg">
                    Broadcast Live Update
                </button>
            </div>

            <div class="pt-4 border-t border-zinc-800/60 space-y-4">
                <h4 class="text-xs font-black uppercase tracking-widest text-yellow-500">2. Swap Active Match Teams</h4>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-zinc-400 uppercase mb-1">Batting House</label>
                        <input type="text" id="input-batting-team" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-yellow-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-400 uppercase mb-1">Bowling House</label>
                        <input type="text" id="input-bowling-team" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-yellow-400">
                    </div>
                </div>
                <button id="btn-teams-update" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold uppercase text-xs py-2.5 rounded-xl transition tracking-wider">
                    Update Participating Teams
                </button>
            </div>
        </section>

    </main>

    <script>
        // 🚨 CONFIGURATION
        const SUPABASE_URL = "https://gukcpxzcffflrgywqrpy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_O3RVhFtwti2D8nOyTAnU4w_2N-0ZL44"; 

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // TAB SWITCHING INFRASTRUCTURE LAYOUTS
        function switchTab(activeTab) {
            const tabs = ['live', 'points', 'fixtures'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                const view = document.getElementById(`view-${tab}-section`);
                if (tab === activeTab) {
                    btn.className = "py-2.5 text-sm font-black uppercase tracking-wider rounded-lg transition bg-white text-black";
                    view.classList.remove('hidden');
                } else {
                    btn.className = "py-2.5 text-sm font-bold uppercase tracking-wider rounded-lg transition text-zinc-400 hover:text-white";
                    view.classList.add('hidden');
                }
            });
            if(activeTab === 'points') fetchPointsTable();
            if(activeTab === 'fixtures') fetchFixtures();
        }

        // ==================== LIVE Hub LOGIC ====================
        async function fetchLiveScore() {
            const { data, error } = await supabase.from('live_match').select('*').eq('id', 1).single();
            if (data) {
                updateUI(data);
                document.getElementById('input-runs').value = data.runs;
                document.getElementById('input-wickets').value = data.wickets;
                document.getElementById('input-overs').value = data.overs;
                document.getElementById('input-commentary').value = data.commentary;
                document.getElementById('input-batting-team').value = data.batting_team;
                document.getElementById('input-bowling-team').value = data.bowling_team;
            }
        }

        function updateUI(matchData) {
            document.getElementById('view-batting').innerText = matchData.batting_team;
            document.getElementById('view-bowling').innerText = matchData.bowling_team;
            document.getElementById('view-runs').innerText = matchData.runs;
            document.getElementById('view-wickets').innerText = matchData.wickets;
            document.getElementById('view-overs').innerText = matchData.overs;
            document.getElementById('view-commentary').innerText = matchData.commentary;
        }

        document.getElementById('btn-update').addEventListener('click', async () => {
            await supabase.from('live_match').update({ 
                runs: parseInt(document.getElementById('input-runs').value) || 0, 
                wickets: parseInt(document.getElementById('input-wickets').value) || 0, 
                overs: document.getElementById('input-overs').value || "0.0", 
                commentary: document.getElementById('input-commentary').value || "" 
            }).eq('id', 1);
        });

        document.getElementById('btn-teams-update').addEventListener('click', async () => {
            await supabase.from('live_match').update({ 
                batting_team: document.getElementById('input-batting-team').value, 
                bowling_team: document.getElementById('input-bowling-team').value 
            }).eq('id', 1);
        });

        // ==================== POINTS TABLE LOGIC ====================
        async function fetchPointsTable() {
            const { data, error } = await supabase.from('points_table').select('*').order('points', { ascending: false });
            if (data) {
                const container = document.getElementById('points-table-rows');
                container.innerHTML = '';
                data.forEach(row => {
                    container.innerHTML += `
                        <tr class="hover:bg-zinc-900/50 transition">
                            <td class="py-4 px-6 font-black text-white uppercase">${row.house_name}</td>
                            <td class="py-4 px-4 text-center text-zinc-300">${row.played}</td>
                            <td class="py-4 px-4 text-center text-emerald-400">${row.won}</td>
                            <td class="py-4 px-4 text-center text-red-400">${row.lost}</td>
                            <td class="py-4 px-4 text-center text-yellow-400 font-black">${row.points}</td>
                            <td class="py-4 px-6 text-right text-zinc-400 font-mono">${row.nrr}</td>
                        </tr>`;
                });
            }
        }

        // ==================== FIXTURES LOGIC ====================
        async function fetchFixtures() {
            const { data, error } = await supabase.from('fixtures').select('*').order('match_num', { ascending: true });
            if (data) {
                const container = document.getElementById('fixtures-container');
                container.innerHTML = '';
                data.forEach(match => {
                    const isLive = match.time_status.toUpperCase() === 'LIVE';
                    container.innerHTML += `
                        <div class="bg-zinc-900 border ${isLive ? 'border-red-500/50 shadow-red-950/20' : 'border-zinc-800'} p-5 rounded-xl space-y-3 relative">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black text-zinc-500 uppercase">Match 0${match.match_num}</span>
                                <span class="text-xs font-black px-2 py-0.5 rounded uppercase tracking-wider ${isLive ? 'bg-red-500 text-white animate-pulse' : 'bg-zinc-800 text-zinc-400'}">${match.time_status}</span>
                            </div>
                            <h4 class="font-black text-md uppercase text-white tracking-tight">${match.teams}</h4>
                            <p class="text-xs font-medium text-zinc-400 border-t border-zinc-800/80 pt-2">${match.result_summary}</p>
                        </div>`;
                });
            }
        }

        // REALTIME CHANNEL ENGINE CONTROLLER
        supabase.channel('public:live_match').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'live_match' }, payload => {
            updateUI(payload.new);
        }).subscribe();

        fetchLiveScore();
    </script>
</body>
</html>
